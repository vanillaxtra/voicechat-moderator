name: VoicechatModerator
version: "${version}"
main: dev.voicechat.moderator.VoicechatModeratorPlugin
api-version: "1.21"
description: Transcribes Simple Voice Chat audio via Whisper with word-group moderation.
authors:
  - VoicechatModerator

depend:
  - voicechat

softdepend:
  - PlaceholderAPI
  - AdvancedBan
  - LiteBans
  - LuckPerms

commands:
  voicechatmoderator:
    description: Manage VoicechatModerator — reload, enable, disable, status, reviews.
    aliases: [vcm]
    usage: /vcm <reload|enable|disable|status|reviews|viewreport|markreviewed>
    permission: voicechatmoderator.reload

  reportvoice:
    description: Report a player's recent voice chat activity.
    usage: /reportvoice <player>
    permission: voicechatmoderator.report

permissions:
  voicechatmoderator.reload:
    description: Allows reloading config and checking status.
    default: op
  voicechatmoderator.toggle:
    description: Allows enabling and disabling VoicechatModerator at runtime.
    default: op
  voicechatmoderator.report:
    description: Allows filing a voice chat report via /reportvoice.
    default: true
  voicechatmoderator.review:
    description: Allows viewing and reviewing filed voice chat reports.
    default: op
